<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Quiz Infantil Esportivo</title>

<style>
body {
    font-family: 'Comic Sans MS', Arial;
    background: linear-gradient(to bottom, #87CEFA, #e6f7ff);
    margin: 0;
}

/* TOPO */
.topo {
    padding: 15px 30px;
    font-size: 26px;
    color: #ff6600;
}

/* GRID CENTRALIZADO */
.grid {
    display: grid;
    grid-template-columns: repeat(5, 140px);
    justify-content: center;
    gap: 20px;
    margin-top: 40px;
}

/* CARTAS */
.card {
    height: 120px;
    width: 140px;
    background: #c49a6c;
    border-radius: 20px;
    display: flex;
    justify-content: center;
    align-items: center;
    font-weight: bold;
    color: black;
    cursor: pointer;
    transition: 0.3s;
}

.card:hover {
    transform: scale(1.05);
}

.card.used {
    background: #ddd;
    cursor: not-allowed;
}

/* MODAL FUNDO */
.modal {
    position: fixed;
    top:0; left:0;
    width:100%; height:100%;
    background: rgba(0,0,0,0.6);
    backdrop-filter: blur(4px);
    display:none;
    justify-content:center;
    align-items:center;
}

/* CAIXA CENTRAL */
.modal-box {
    background: #f2f2f2;
    border-radius: 25px;
    padding: 25px;
    width: 340px;
    text-align: center;
    box-shadow: 0 10px 30px rgba(0,0,0,0.3);
}

/* IMAGEM */
.modal img {
    width: 120px;
    margin-bottom: 10px;
}

/* PERGUNTA */
.question {
    font-size: 20px;
    margin: 10px 0 15px;
}

/* BOTÕES */
.option {
    margin: 8px 0;
    padding: 12px;
    border-radius: 15px;
    color: white;
    font-weight: bold;
    cursor: pointer;
    transition: 0.2s;
}

.option:hover {
    transform: scale(1.03);
}

/* CORES */
.a { background: #4dabf7; }
.b { background: #51cf66; }
.c { background: #cc5de8; }

.correct { background: green !important; }
.wrong { background: red !important; }
</style>
</head>

<body>

<div class="topo">
    <div>🏆 Quiz Infantil</div>
    <div class="score-box">⭐ <span id="score">0</span></div>
</div>

<div class="grid" id="grid"></div>

<div class="modal" id="modal">
    <div class="modal-box" id="modalBox"></div>
</div>

<!-- SOM -->
<audio id="acerto" src="https://www.soundjay.com/buttons/sounds/button-4.mp3"></audio>
<audio id="erro" src="https://www.soundjay.com/buttons/sounds/button-10.mp3"></audio>

<!-- CONFETE -->
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

<script>

let score = 0;

const cards = [

{imgPergunta:"https://img.icons8.com/color/200/judo.png", q:"Qual esporte usa kimono?", o:["Futebol","Judô","Natação"], a:1},

{imgPergunta:"https://img.icons8.com/color/200/swimming.png", q:"Qual esporte é na água?", o:["Basquete","Natação","Corrida"], a:1},

{imgPergunta:"https://img.icons8.com/color/200/basketball.png", q:"Qual usa cesta?", o:["Futebol","Basquete","Vôlei"], a:1},

{imgPergunta:"https://img.icons8.com/color/200/volleyball.png", q:"Qual usa rede?", o:["Judô","Vôlei","Corrida"], a:1},

{imgPergunta:"https://img.icons8.com/color/200/running.png", q:"Qual é corrida?", o:["Corrida","Tênis","Judô"], a:0},

{imgPergunta:"https://img.icons8.com/color/200/tennis.png", q:"Qual usa raquete?", o:["Tênis","Futebol","Corrida"], a:0},

{imgPergunta:"https://img.icons8.com/color/200/soccer-ball.png", q:"Qual usa gol?", o:["Futebol","Judô","Tênis"], a:0},

{imgPergunta:"https://img.icons8.com/color/200/basketball.png", q:"Qual usa bola laranja?", o:["Basquete","Futebol","Tênis"], a:0},

{imgPergunta:"https://img.icons8.com/color/200/swimming.png", q:"Qual usa piscina?", o:["Natação","Corrida","Basquete"], a:0},

{imgPergunta:"https://img.icons8.com/color/200/judo.png", q:"Qual é luta?", o:["Judô","Futebol","Tênis"], a:0},

{imgPergunta:"https://img.icons8.com/color/200/volleyball.png", q:"Qual joga com rede?", o:["Vôlei","Corrida","Judô"], a:0},

{imgPergunta:"https://img.icons8.com/color/200/running.png", q:"Qual corre rápido?", o:["Corrida","Natação","Judô"], a:0},

{imgPergunta:"https://img.icons8.com/color/200/tennis.png", q:"Qual bate na bolinha?", o:["Tênis","Futebol","Corrida"], a:0},

{imgPergunta:"https://img.icons8.com/color/200/basketball.png", q:"Qual tem cesta alta?", o:["Basquete","Judô","Corrida"], a:0},

{imgPergunta:"https://img.icons8.com/color/200/swimming.png", q:"Qual mergulha na água?", o:["Natação","Corrida","Basquete"], a:0},

{imgPergunta:"https://img.icons8.com/color/200/soccer-ball.png", q:"Qual usa os pés na bola?", o:["Futebol","Tênis","Judô"], a:0},

{imgPergunta:"https://img.icons8.com/color/200/judo.png", q:"Qual é arte marcial?", o:["Judô","Futebol","Corrida"], a:0},

{imgPergunta:"https://img.icons8.com/color/200/volleyball.png", q:"Qual joga bola por cima da rede?", o:["Vôlei","Tênis","Corrida"], a:0},

{imgPergunta:"https://img.icons8.com/color/200/running.png", q:"Qual usa tênis para correr?", o:["Corrida","Natação","Judô"], a:0},

{imgPergunta:"https://img.icons8.com/color/200/tennis.png", q:"Qual usa raquete para jogar?", o:["Tênis","Futebol","Vôlei"], a:0}

];
const grid = document.getElementById("grid");
const modal = document.getElementById("modal");
const modalBox = document.getElementById("modalBox");

cards.forEach((c,i)=>{
    const card = document.createElement("div");
    card.className = "card";
    card.innerText = "Carta " + (i+1);

    card.onclick = () => {
        if(card.classList.contains("used")) return;
        openCard(i, card);
    };

    grid.appendChild(card);
});

function speak(text){
    const msg = new SpeechSynthesisUtterance(text);
    msg.lang = "pt-BR";
    speechSynthesis.speak(msg);
}

function openCard(i, cardElement){
    const c = cards[i];

   modalBox.innerHTML = `
    <img src="${c.imgPergunta}">
    <div class="question">${c.q}</div>

    ${c.o.map((opt,idx)=>`
        <div class="option ${idx===0?'a':idx===1?'b':'c'}"
        onclick="answer(${idx},${c.a}, this)">
        ${opt}
        </div>
    `).join("")}
`;
    speak(c.q);

    modal.style.display = "flex";
    cardElement.classList.add("used");
}

function answer(selected, correct, el){
    if(selected === correct){
        el.classList.add("correct");
        document.getElementById("acerto").play();
        score++;
        document.getElementById("score").innerText = score;

        confetti({
            particleCount: 100,
            spread: 70,
            origin: { y: 0.6 }
        });

    } else {
        el.classList.add("wrong");
        document.getElementById("erro").play();
    }
}

modal.onclick = ()=> modal.style.display="none";

</script>

</body>
</html>
