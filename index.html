<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Quiz Esportivo do Bem</title>

<style>
body {
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg, #1e3c72, #2a5298);
    color: white;
    text-align: center;
    padding: 20px;
}

h1 { margin-bottom: 10px; }

#game {
    max-width: 600px;
    margin: auto;
    background: rgba(0,0,0,0.4);
    padding: 20px;
    border-radius: 15px;
}

.card-number {
    font-size: 14px;
    opacity: 0.8;
}

.question {
    font-size: 20px;
    margin: 15px 0;
}

img {
    width: 180px;
    height: 180px;
    object-fit: contain;
    margin: 10px;
    background: white;
    border-radius: 10px;
}

.option {
    display: block;
    margin: 10px;
    padding: 12px;
    border-radius: 10px;
    background: #00c9a7;
    cursor: pointer;
}

.option:hover { background: #00a386; }

#nextBtn {
    margin-top: 20px;
    padding: 10px 20px;
    background: orange;
    border: none;
    border-radius: 10px;
    cursor: pointer;
    display: none;
}
</style>
</head>

<body>

<h1>🏅 Quiz Esportivo do Bem</h1>

<div id="game">
    <div class="card-number" id="cardNumber"></div>
    <img id="image">
    <div class="question" id="question"></div>
    <div id="options"></div>
    <button id="nextBtn" onclick="nextQuestion()">Próxima ➡️</button>
</div>

<script>

const quiz = [

{img:"https://upload.wikimedia.org/wikipedia/commons/6/6e/Football_%28soccer_ball%29.svg", q:"Qual esporte usa essa bola?", o:["Futebol","Tênis","Natação"], a:0},

{img:"https://upload.wikimedia.org/wikipedia/commons/3/3a/Swimming_icon.png", q:"Qual esporte acontece na água?", o:["Basquete","Natação","Corrida"], a:1},

{img:"https://upload.wikimedia.org/wikipedia/commons/7/7a/Basketball.png", q:"Qual esporte usa cesta?", o:["Vôlei","Basquete","Futebol"], a:1},

{img:"https://upload.wikimedia.org/wikipedia/commons/0/0d/Volleyball_icon.png", q:"Qual esporte usa rede?", o:["Judô","Vôlei","Corrida"], a:1},

{img:"https://upload.wikimedia.org/wikipedia/commons/1/1b/Running_icon.png", q:"Qual esporte é esse?", o:["Corrida","Xadrez","Tênis"], a:0},

{img:"https://upload.wikimedia.org/wikipedia/commons/8/8e/Judo_icon.png", q:"Qual esporte usa kimono?", o:["Judô","Futebol","Vôlei"], a:0},

{img:"https://upload.wikimedia.org/wikipedia/commons/4/4e/Tennis_icon.png", q:"Qual esporte usa raquete?", o:["Tênis","Corrida","Futebol"], a:0},

{img:"https://upload.wikimedia.org/wikipedia/commons/5/5c/Handshake_icon.png", q:"O que essa imagem mostra?", o:["Briga","Amizade","Tristeza"], a:1},

{img:"https://upload.wikimedia.org/wikipedia/commons/3/3b/Clapping_hands_icon.png", q:"O que devemos fazer com o amigo?", o:["Ignorar","Aplaudir","Empurrar"], a:1},

{img:"https://upload.wikimedia.org/wikipedia/commons/6/65/Helping_icon.png", q:"O que é ajudar?", o:["Empurrar","Ajudar o amigo","Brigar"], a:1},

{img:"https://upload.wikimedia.org/wikipedia/commons/2/2e/Happy_face.png", q:"Como devemos jogar?", o:["Bravos","Felizes","Tristes"], a:1},

{img:"https://upload.wikimedia.org/wikipedia/commons/8/8f/Teamwork_icon.png", q:"O que é jogar em equipe?", o:["Sozinho","Juntos","Brigando"], a:1},

{img:"https://upload.wikimedia.org/wikipedia/commons/9/9d/Stop_sign.png", q:"Empurrar no jogo é:", o:["Certo","Errado","Legal"], a:1},

{img:"https://upload.wikimedia.org/wikipedia/commons/1/12/Heart_icon.png", q:"O mais importante é:", o:["Ganhar","Amar","Ser melhor"], a:1},

{img:"https://upload.wikimedia.org/wikipedia/commons/0/0b/Star_icon.png", q:"Todos são:", o:["Sem valor","Importantes","Iguais não"], a:1},

{img:"https://upload.wikimedia.org/wikipedia/commons/3/3e/Wait_icon.png", q:"Esperar sua vez é:", o:["Errado","Certo","Chato"], a:1},

{img:"https://upload.wikimedia.org/wikipedia/commons/2/2d/Sharing_icon.png", q:"Dividir é:", o:["Ruim","Bom","Feio"], a:1},

{img:"https://upload.wikimedia.org/wikipedia/commons/6/6b/Smile_icon.png", q:"Devemos tratar os outros com:", o:["Raiva","Carinho","Tristeza"], a:1},

{img:"https://upload.wikimedia.org/wikipedia/commons/5/55/Peace_icon.png", q:"No esporte devemos ter:", o:["Briga","Paz","Grito"], a:1},

{img:"https://upload.wikimedia.org/wikipedia/commons/4/4c/Love_icon.png", q:"Jesus ensinou:", o:["Amor","Briga","Ignorar"], a:0}

];

let current = 0;
let score = 0;

function loadQuestion() {
    document.getElementById("nextBtn").style.display = "none";

    let q = quiz[current];

    document.getElementById("cardNumber").innerText = "Carta " + (current+1) + " de 20";
    document.getElementById("question").innerText = q.q;
    document.getElementById("image").src = q.img;

    let optionsHtml = "";
    q.o.forEach((opt, i) => {
        optionsHtml += `<div class="option" onclick="selectOption(${i})">${opt}</div>`;
    });

    document.getElementById("options").innerHTML = optionsHtml;
}

function selectOption(i) {
    let correct = quiz[current].a;
    let options = document.querySelectorAll(".option");

    options.forEach((opt, index) => {
        opt.style.pointerEvents = "none";
        if(index === correct) opt.style.background = "green";
        else if(index === i) opt.style.background = "red";
    });

    if(i === correct) score++;

    document.getElementById("nextBtn").style.display = "inline-block";
}

function nextQuestion() {
    current++;
    if(current < quiz.length) {
        loadQuestion();
    } else {
        document.getElementById("game").innerHTML =
        `<h2>Fim do jogo! 🎉</h2>
         <p>Pontuação: ${score}/20</p>
         <p>O mais importante é jogar com amor 💙</p>`;
    }
}

loadQuestion();

</script>

</body>
</html>
