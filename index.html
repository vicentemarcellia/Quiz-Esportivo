<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz Esportivo - Turma Flores</title>
    <style>
        :root {
            --primary-bg: #122049;
            --secondary-bg: #1e3a8a;
            --title-yellow: #fde047;
            --title-cyan: #22d3ee;
            --modal-bg: #f8fafc;
        }

        body {
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, var(--primary-bg) 0%, var(--secondary-bg) 100%);
            color: white;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
        }

        /* TOPO */
        .topo {
            display: flex;
            justify-content: center;
            padding: 25px;
            background: rgba(0,0,0,0.3);
            backdrop-filter: blur(5px);
            position: sticky;
            top: 0;
            z-index: 10;
        }

        .titulo {
            font-size: clamp(1.2rem, 4vw, 2.2rem);
            font-weight: 900;
            background: linear-gradient(135deg, var(--title-yellow) 0%, var(--title-cyan) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-transform: uppercase;
            text-align: center;
        }

        /* GRID DE CARTAS */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(110px, 1fr));
            gap: 15px;
            padding: 20px 5%;
            max-width: 900px;
            margin: 0 auto;
        }

        .card {
            aspect-ratio: 1/1;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            font-size: 2.5rem;
            font-weight: 900;
            border: 2px solid rgba(255,255,255,0.1);
        }

        .card:hover { transform: translateY(-5px); background: rgba(255, 255, 255, 0.2); border-color: var(--title-cyan); }
        .card.used { opacity: 0.2; pointer-events: none; filter: grayscale(1); }

        /* MODAL DA PERGUNTA */
        .modal {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.9);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 100;
            padding: 20px;
        }

        .box {
            background: var(--modal-bg);
            color: #1e293b;
            padding: 30px;
            border-radius: 25px;
            width: 100%;
            max-width: 450px;
            text-align: center;
            position: relative;
            animation: popIn 0.4s ease-out;
        }

        @keyframes popIn { from { transform: scale(0.8); } to { transform: scale(1); } }

        .emoji-grande {
            font-size: 6rem;
            margin-bottom: 15px;
            display: block;
        }

        .pergunta-container {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-bottom: 25px;
        }

        .pergunta { font-size: 1.4rem; font-weight: 800; color: #0f172a; text-align: left; line-height: 1.2; }

        .audio-btn { background: none; border: none; cursor: pointer; font-size: 1.8rem; }

        /* BOTÕES DE RESPOSTA */
        .opcao {
            display: flex;
            align-items: center;
            width: 100%;
            margin: 12px 0;
            padding: 18px;
            border-radius: 12px;
            border: none;
            color: white;
            font-size: 1.2rem;
            font-weight: 700;
            cursor: pointer;
            text-align: left;
            transition: transform 0.2s;
        }

        .opcao:active { transform: scale(0.98); }

        .a { background: linear-gradient(135deg, #3b82f6, #1e40af); }
        .b { background: linear-gradient(135deg, #22c55e, #166534); }
        .c { background: linear-gradient(135deg, #a855f7, #6b21a8); }

        .correct { background: #15803d !important; animation: pulse 0.5s infinite alternate; }
        .wrong { background: #b91c1c !important; opacity: 0.7; }

        @keyframes pulse { from { transform: scale(1); } to { transform: scale(1.03); } }

        /* MASCOTE */
        .mascote-area {
            position: fixed;
            bottom: 20px;
            right: 20px;
            display: flex;
            align-items: flex-end;
        }

        .balao {
            background: white; color: #1e293b; padding: 12px;
            border-radius: 15px 15px 0 15px; margin-right: 10px;
            font-size: 14px; font-weight: bold; box-shadow: 0 5px 15px rgba(0,0,0,0.3);
            max-width: 150px;
        }

        /* TELA FINAL */
        #final {
            display: none; position: fixed; inset: 0; background: var(--primary-bg);
            z-index: 200; flex-direction: column; justify-content: center; align-items: center;
            text-align: center; padding: 20px;
        }
    </style>
</head>
<body>

<div class="topo"><div class="titulo">⚽ QUIZ ESPORTIVO DA TURMA FLORES ⚽</div></div>
<div class="grid" id="grid"></div>

<div class="modal" id="modal"><div class="box" id="box"></div></div>

<div id="final">
    <span style="font-size: 7rem;">🌸</span>
    <h1 style="color: var(--title-yellow); font-size: 2.5rem; margin: 20px 0;">Parabéns Turma Flores,<br>vocês são incríveis!</h1>
    <button onclick="location.reload()" style="padding: 20px 50px; border-radius: 50px; border:none; background: var(--title-cyan); font-weight: 900; font-size: 1.2rem; cursor:pointer; color: #122049;">JOGAR NOVAMENTE</button>
</div>

<div class="mascote-area">
    <div class="balao" id="fala">Clique em um número!</div>
    <div style="font-size: 4rem;" id="mascote">🤖</div>
</div>

<audio id="acerto" src="https://assets.mixkit.co/sfx/preview/mixkit-winning-chimes-2015.mp3"></audio>
<audio id="erro" src="https://assets.mixkit.co/sfx/preview/mixkit-wrong-answer-fail-notification-946.mp3"></audio>

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

<script>
const cards = [
    {emoji:"🥋", q:"Qual esporte usa kimono?", o:["Judô","Futebol","Natação"], a:0},
    {emoji:"🏊", q:"Adivinhe o esporte que acontece na piscina:", o:["Natação","Corrida","Judô"], a:0},
    {emoji:"🏀", q:"Qual esporte joga a bola na cesta?", o:["Basquete","Vôlei","Tênis"], a:0},
    {emoji:"🏐", q:"Adivinhe o esporte que joga por cima da rede:", o:["Vôlei","Futebol","Judô"], a:0},
    {emoji:"🏃", q:"Qual esporte é correr rápido?", o:["Corrida","Natação","Tênis"], a:0},
    {emoji:"🎾", q:"Adivinhe o esporte que usa raquete:", o:["Tênis","Futebol","Judô"], a:0},
    {emoji:"⚽", q:"Qual usa os pés para chutar?", o:["Futebol","Tênis","Vôlei"], a:0},
    {emoji:"🤺", q:"Adivinhe o esporte que usa espada:", o:["Esgrima","Basquete","Natação"], a:0},
    {emoji:"🤸", q:"Qual faz acrobacias?", o:["Ginástica","Futebol","Tênis"], a:0},
    {emoji:"🥊", q:"Adivinhe o esporte que usa luvas para lutar:", o:["Boxe","Vôlei","Corrida"], a:0},
    {emoji:"🚴", q:"Qual esporte usa bicicleta?", o:["Ciclismo","Natação","Judô"], a:0},
    {emoji:"🏹", q:"Adivinhe o esporte que usa arco e flecha:", o:["Tiro com arco","Futebol","Basquete"], a:0},
    {emoji:"🏓", q:"Qual esporte usa mesa e raquete pequena?", o:["Tênis de mesa","Corrida","Judô"], a:0},
    {emoji:"🏋️", q:"Adivinhe o esporte que levanta peso:", o:["Levantamento de peso","Futebol","Tênis"], a:0},
    {emoji:"💦", q:"Qual esporte pula na água?", o:["Saltos ornamentais","Corrida","Vôlei"], a:0},
    {emoji:"🏄", q:"Adivinhe o esporte que usa prancha no mar:", o:["Surfe","Basquete","Judô"], a:0},
    {emoji:"🛹", q:"Qual esporte usa skate?", o:["Skate","Natação","Futebol"], a:0},
    {emoji:"🚣", q:"Adivinhe o esporte que usa barco com remos:", o:["Remo","Corrida","Tênis"], a:0},
    {emoji:"🤾", q:"Qual esporte usa as mãos e tem goleiro?", o:["Handebol","Futebol","Tênis"], a:0},
    {emoji:"🏈", q:"Adivinhe o esporte que corre com a bola na mão:", o:["Rugby","Vôlei","Basquete"], a:0}
];

let usadas = 0;
const grid = document.getElementById("grid");

// Criar o grid de números
cards.forEach((c, i) => {
    const div = document.createElement("div");
    div.className = "card";
    div.innerText = i + 1;
    div.onclick = () => openCard(i, div);
    grid.appendChild(div);
});

function narrar(texto) {
    const voz = new SpeechSynthesisUtterance(texto);
    voz.lang = 'pt-BR';
    speechSynthesis.speak(voz);
}

function openCard(i, el){
    const c = cards[i];
    const box = document.getElementById("box");
    box.innerHTML = `
        <span class="emoji-grande">${c.emoji}</span>
        <div class="pergunta-container">
            <div class="pergunta">${c.q}</div>
            <button class="audio-btn" onclick="narrar('${c.q}')">🔊</button>
        </div>
        ${c.o.map((op, idx) => `
            <button class="opcao ${idx==0?'a':idx==1?'b':'c'}" onclick="responder(${idx}, ${c.a}, this)">
                ${op}
            </button>
        `).join("")}
    `;
    document.getElementById("modal").style.display = "flex";
    el.classList.add("used");
    narrar(c.q);
}

function responder(sel, correta, el){
    const botoes = document.querySelectorAll(".opcao");
    botoes.forEach(b => b.style.pointerEvents = "none");

    if(sel == correta){
        el.classList.add("correct");
        document.getElementById("acerto").play();
        confetti({particleCount: 150, spread: 70});
        document.getElementById("fala").innerText = "Isso mesmo! Parabéns!";
        document.getElementById("mascote").innerText = "🤩";
    } else {
        el.classList.add("wrong");
        botoes[correta].classList.add("correct");
        document.getElementById("erro").play();
        document.getElementById("fala").innerText = "Quase lá!";
        document.getElementById("mascote").innerText = "💪";
    }

    usadas++;
    setTimeout(() => {
        document.getElementById("modal").style.display = "none";
        document.getElementById("mascote").innerText = "🤖";
        document.getElementById("fala").innerText = "Escolha outro número!";
        if(usadas == cards.length) document.getElementById("final").style.display = "flex";
    }, 2500);
}
</script>
</body>
</html>
