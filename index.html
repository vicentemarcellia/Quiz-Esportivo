<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Cartas do Quiz Esportivo</title>

<style>
body {
    font-family: Arial;
    background: linear-gradient(135deg, #1e3c72, #2a5298);
    text-align: center;
    color: white;
}

h1 { margin: 20px; }

/* GRID */
.grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, 120px);
    justify-content: center;
    gap: 12px;
    padding: 20px;
}

/* CARTAS */
.card {
    width: 120px;
    height: 170px;
    perspective: 1000px;
}

.inner {
    width: 100%;
    height: 100%;
    position: relative;
    transition: transform 0.6s;
    transform-style: preserve-3d;
    cursor: pointer;
}

.front, .back {
    position: absolute;
    width: 100%;
    height: 100%;
    border-radius: 12px;
    backface-visibility: hidden;
}

.front {
    background: white;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
}

.front img {
    width: 70px;
}

.number {
    color: black;
    font-weight: bold;
}

.back {
    background: #222;
    transform: rotateY(180deg);
    padding: 10px;
    font-size: 14px;
}

.option {
    background: #444;
    margin: 5px 0;
    padding: 5px;
    border-radius: 6px;
    cursor: pointer;
}

/* MODAL (CARTA GRANDE) */
.modal {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.8);
    display: none;
    align-items: center;
    justify-content: center;
}

.modal-content {
    width: 300px;
    background: #222;
    padding: 20px;
    border-radius: 15px;
}

.close {
    margin-top: 10px;
    background: orange;
    padding: 8px;
    border-radius: 10px;
    cursor: pointer;
}
</style>
</head>

<body>

<h1>🃏 Cartas do Quiz Esportivo</h1>

<div class="grid" id="grid"></div>

<!-- CARTA CENTRAL -->
<div class="modal" id="modal">
    <div class="modal-content" id="modalContent"></div>
</div>

<script>

const cards = [

{img:"https://cdn-icons-png.flaticon.com/512/861/861512.png", q:"Qual esporte usa bola e gol?", o:["Futebol","Tênis","Natação"], a:0},
{img:"https://cdn-icons-png.flaticon.com/512/2965/2965567.png", q:"Qual esporte é na água?", o:["Basquete","Natação","Corrida"], a:1},
{img:"https://cdn-icons-png.flaticon.com/512/889/889455.png", q:"Qual esporte usa cesta?", o:["Futebol","Basquete","Vôlei"], a:1},
{img:"https://cdn-icons-png.flaticon.com/512/1041/1041916.png", q:"Qual esporte usa rede?", o:["Judô","Vôlei","Corrida"], a:1},
{img:"https://cdn-icons-png.flaticon.com/512/3043/3043887.png", q:"Qual esporte é correr?", o:["Corrida","Xadrez","Tênis"], a:0},
{img:"https://cdn-icons-png.flaticon.com/512/857/857455.png", q:"Qual esporte usa kimono?", o:["Judô","Futebol","Tênis"], a:0},
{img:"https://cdn-icons-png.flaticon.com/512/854/854894.png", q:"Qual esporte usa raquete?", o:["Tênis","Futebol","Corrida"], a:0},
{img:"https://cdn-icons-png.flaticon.com/512/889/889455.png", q:"Onde fazemos cesta?", o:["Basquete","Futebol","Natação"], a:0},
{img:"https://cdn-icons-png.flaticon.com/512/1041/1041916.png", q:"Qual tem rede e bola?", o:["Vôlei","Corrida","Judô"], a:0},
{img:"https://cdn-icons-png.flaticon.com/512/861/861512.png", q:"Qual usa chute na bola?", o:["Futebol","Tênis","Judô"], a:0},

{img:"https://cdn-icons-png.flaticon.com/512/2965/2965567.png", q:"Qual mergulha na água?", o:["Natação","Corrida","Basquete"], a:0},
{img:"https://cdn-icons-png.flaticon.com/512/3043/3043887.png", q:"Qual é mais rápido?", o:["Corrida","Xadrez","Tênis"], a:0},
{img:"https://cdn-icons-png.flaticon.com/512/857/857455.png", q:"Qual luta usa kimono?", o:["Judô","Futebol","Vôlei"], a:0},
{img:"https://cdn-icons-png.flaticon.com/512/854/854894.png", q:"Qual bate na bolinha?", o:["Tênis","Futebol","Corrida"], a:0},
{img:"https://cdn-icons-png.flaticon.com/512/889/889455.png", q:"Qual tem cesta alta?", o:["Basquete","Judô","Corrida"], a:0},
{img:"https://cdn-icons-png.flaticon.com/512/1041/1041916.png", q:"Qual joga por cima da rede?", o:["Vôlei","Tênis","Corrida"], a:0},
{img:"https://cdn-icons-png.flaticon.com/512/861/861512.png", q:"Qual usa gol?", o:["Futebol","Judô","Tênis"], a:0},
{img:"https://cdn-icons-png.flaticon.com/512/2965/2965567.png", q:"Qual usa piscina?", o:["Natação","Basquete","Corrida"], a:0},
{img:"https://cdn-icons-png.flaticon.com/512/3043/3043887.png", q:"Qual corre no chão?", o:["Corrida","Natação","Judô"], a:0},
{img:"https://cdn-icons-png.flaticon.com/512/854/854894.png", q:"Qual usa raquete?", o:["Tênis","Futebol","Vôlei"], a:0}

];

const grid = document.getElementById("grid");
const modal = document.getElementById("modal");
const modalContent = document.getElementById("modalContent");

cards.forEach((c, i) => {
    const card = document.createElement("div");
    card.className = "card";

    card.innerHTML = `
        <div class="inner" onclick="openCard(${i})">
            <div class="front">
                <img src="${c.img}">
                <div class="number">Carta ${i+1}</div>
            </div>
        </div>
    `;

    grid.appendChild(card);
});

function openCard(i){
    const c = cards[i];

    modalContent.innerHTML = `
        <h3>${c.q}</h3>
        ${c.o.map(opt => `<div class="option">${opt}</div>`).join("")}
        <div class="close" onclick="closeModal()">Fechar</div>
    `;

    modal.style.display = "flex";
}

function closeModal(){
    modal.style.display = "none";
}

</script>

</body>
</html>
