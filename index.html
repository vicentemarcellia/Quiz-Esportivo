<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Quiz Infantil Esportivo</title>

<style>
body {
    font-family: 'Comic Sans MS', Arial;
    background: linear-gradient(to bottom, #87CEFA, #ffffff);
    text-align: center;
}

/* TOPO */
.topo {
    display: flex;
    justify-content: space-between;
    padding: 15px 30px;
    font-size: 24px;
    color: #ff6600;
}

.score-box {
    background: #fff3cd;
    padding: 10px;
    border-radius: 10px;
}

/* GRID */
.grid {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 12px;
    max-width: 900px;
    margin: auto;
}

/* CARTAS */
.card {
    height: 130px;
    background: #ffcc80;
    border-radius: 20px;
    display: flex;
    justify-content: center;
    align-items: center;
    font-weight: bold;
    cursor: pointer;
    transition: 0.3s;
}

.card:hover { transform: scale(1.05); }

.card.used {
    background: #ddd;
    cursor: not-allowed;
}

/* MODAL */
.modal {
    position: fixed;
    top:0; left:0;
    width:100%; height:100%;
    background: rgba(0,0,0,0.5);
    display:none;
    justify-content:center;
    align-items:center;
}

.modal-box {
    background: white;
    border-radius: 20px;
    padding: 20px;
    width: 320px;
}

/* IMAGEM */
.modal img {
    width: 120px;
}

/* OPÇÕES */
.option {
    margin: 8px 0;
    padding: 10px;
    border-radius: 12px;
    cursor: pointer;
    color: white;
    font-weight: bold;
}

.a { background: #4dabf7; }
.b { background: #51cf66; }
.c { background: #cc5de8; }

.correct { background: green !important; }
.wrong { background: red !important; }

</style>
</head>

<body>

<div class="topo">
    <div>🏆 Quiz Infantil</div>
    <div class="score-box">⭐ <span id="score">0</span></div>
</div>

<div class="grid" id="grid"></div>

<div class="modal" id="modal">
    <div class="modal-box" id="modalBox"></div>
</div>

<!-- SOM -->
<audio id="acerto" src="https://www.soundjay.com/buttons/sounds/button-4.mp3"></audio>
<audio id="erro" src="https://www.soundjay.com/buttons/sounds/button-10.mp3"></audio>

<!-- CONFETE -->
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

<script>

let score = 0;

const cards = [

{imgPergunta:"https://cdn-icons-png.flaticon.com/512/3062/3062634.png", q:"Qual esporte usa kimono?", o:["Futebol","Judô","Natação"], a:1},

{imgPergunta:"https://cdn-icons-png.flaticon.com/512/2965/2965567.png", q:"Qual esporte é na água?", o:["Basquete","Natação","Corrida"], a:1},

{imgPergunta:"https://cdn-icons-png.flaticon.com/512/889/889455.png", q:"Qual usa cesta?", o:["Futebol","Basquete","Vôlei"], a:1},

{imgPergunta:"https://cdn-icons-png.flaticon.com/512/3145/3145765.png", q:"Qual usa rede?", o:["Judô","Vôlei","Corrida"], a:1},

{imgPergunta:"https://cdn-icons-png.flaticon.com/512/1048/1048943.png", q:"Qual é corrida?", o:["Corrida","Tênis","Judô"], a:0},

{imgPergunta:"https://cdn-icons-png.flaticon.com/512/857/857681.png", q:"Qual usa raquete?", o:["Tênis","Futebol","Corrida"], a:0},

{imgPergunta:"https://cdn-icons-png.flaticon.com/512/861/861512.png", q:"Qual usa gol?", o:["Futebol","Judô","Tênis"], a:0},

{imgPergunta:"https://cdn-icons-png.flaticon.com/512/1828/1828884.png", q:"Qual usa bola laranja?", o:["Basquete","Futebol","Tênis"], a:0},

{imgPergunta:"https://cdn-icons-png.flaticon.com/512/1688/1688400.png", q:"Qual usa piscina?", o:["Natação","Corrida","Basquete"], a:0},

{imgPergunta:"https://cdn-icons-png.flaticon.com/512/3062/3062634.png", q:"Qual é luta?", o:["Judô","Futebol","Tênis"], a:0},

{imgPergunta:"https://cdn-icons-png.flaticon.com/512/3145/3145765.png", q:"Qual joga com rede?", o:["Vôlei","Corrida","Judô"], a:0},

{imgPergunta:"https://cdn-icons-png.flaticon.com/512/1048/1048943.png", q:"Qual corre rápido?", o:["Corrida","Natação","Judô"], a:0},

{imgPergunta:"https://cdn-icons-png.flaticon.com/512/857/857681.png", q:"Qual bate na bolinha?", o:["Tênis","Futebol","Corrida"], a:0},

{imgPergunta:"https://cdn-icons-png.flaticon.com/512/889/889455.png", q:"Qual tem cesta alta?", o:["Basquete","Judô","Corrida"], a:0},

{imgPergunta:"https://cdn-icons-png.flaticon.com/512/1688/1688400.png", q:"Qual mergulha na água?", o:["Natação","Corrida","Basquete"], a:0},

{imgPergunta:"https://cdn-icons-png.flaticon.com/512/861/861512.png", q:"Qual usa os pés na bola?", o:["Futebol","Tênis","Judô"], a:0},

{imgPergunta:"https://cdn-icons-png.flaticon.com/512/3062/3062634.png", q:"Qual é arte marcial?", o:["Judô","Futebol","Corrida"], a:0},

{imgPergunta:"https://cdn-icons-png.flaticon.com/512/3145/3145765.png", q:"Qual joga bola por cima da rede?", o:["Vôlei","Tênis","Corrida"], a:0},

{imgPergunta:"https://cdn-icons-png.flaticon.com/512/1048/1048943.png", q:"Qual usa tênis para correr?", o:["Corrida","Natação","Judô"], a:0},

{imgPergunta:"https://cdn-icons-png.flaticon.com/512/857/857681.png", q:"Qual usa raquete para jogar?", o:["Tênis","Futebol","Vôlei"], a:0}

];
const grid = document.getElementById("grid");
const modal = document.getElementById("modal");
const modalBox = document.getElementById("modalBox");

cards.forEach((c,i)=>{
    const card = document.createElement("div");
    card.className = "card";
    card.innerText = "Carta " + (i+1);

    card.onclick = () => {
        if(card.classList.contains("used")) return;
        openCard(i, card);
    };

    grid.appendChild(card);
});

function speak(text){
    const msg = new SpeechSynthesisUtterance(text);
    msg.lang = "pt-BR";
    speechSynthesis.speak(msg);
}

function openCard(i, cardElement){
    const c = cards[i];

    modalBox.innerHTML = `
        <img src="${c.imgPergunta}">
        <h3>${c.q}</h3>
        ${c.o.map((opt,idx)=>`
            <div class="option ${idx===0?'a':idx===1?'b':'c'}"
            onclick="answer(${idx},${c.a}, this)">
            ${opt}
            </div>
        `).join("")}
    `;

    speak(c.q);

    modal.style.display = "flex";
    cardElement.classList.add("used");
}

function answer(selected, correct, el){
    if(selected === correct){
        el.classList.add("correct");
        document.getElementById("acerto").play();
        score++;
        document.getElementById("score").innerText = score;

        confetti({
            particleCount: 100,
            spread: 70,
            origin: { y: 0.6 }
        });

    } else {
        el.classList.add("wrong");
        document.getElementById("erro").play();
    }
}

modal.onclick = ()=> modal.style.display="none";

</script>

</body>
</html>
