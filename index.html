<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz Esportivo do Bem - Turma Flores</title>

    <style>
        :root {
            --primary-bg: #122049;
            --secondary-bg: #1e3a8a;
            --title-yellow: #fde047;
            --title-cyan: #22d3ee;
            --modal-bg: #f8fafc;
        }

        body {
            margin: 0;
            font-family: 'Segoe UI', 'Comic Sans MS', cursive, sans-serif;
            background: linear-gradient(135deg, var(--primary-bg) 0%, var(--secondary-bg) 100%);
            color: white;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
        }

        /* TOPO */
        .topo {
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 25px 5%;
            background: rgba(0,0,0,0.3);
            backdrop-filter: blur(5px);
            position: sticky;
            top: 0;
            z-index: 10;
        }

        .titulo {
            font-size: clamp(1.4rem, 4vw, 2.5rem);
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 2px;
            background: linear-gradient(135deg, var(--title-yellow) 0%, var(--title-cyan) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 3px 3px 6px rgba(0,0,0,0.5);
        }

        /* GRID */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(130px, 1fr));
            gap: 20px;
            padding: 30px 5%;
            max-width: 1000px;
            margin: 0 auto;
            flex-grow: 1;
        }

        /* CARTAS */
        .card {
            aspect-ratio: 16/10;
            background: #232d4b;
            border-radius: 12px;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            font-size: 1.8rem;
            font-weight: 900;
            color: rgba(255,255,255,0.8);
            border: 3px solid rgba(255,255,255,0.08);
            box-shadow: 0 4px 6px rgba(0,0,0,0.2);
        }

        .card:hover {
            transform: translateY(-5px);
            border-color: var(--title-cyan);
            color: white;
            box-shadow: 0 10px 15px rgba(0,0,0,0.3), 0 0 15px rgba(34, 211, 238, 0.3);
        }

        .card.used {
            opacity: 0.2;
            pointer-events: none;
            filter: grayscale(1);
        }

        /* MODAL */
        .modal {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.85);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 100;
            padding: 20px;
        }

        .box {
            background: var(--modal-bg);
            color: #1e293b;
            padding: 35px;
            border-radius: 25px;
            width: 100%;
            max-width: 500px;
            text-align: center;
            position: relative;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
            animation: popIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes popIn {
            from { transform: scale(0.8); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }

        .emoji-pergunta {
            font-size: 5rem;
            margin-bottom: 20px;
            display: block;
        }

        .pergunta-container {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            margin-bottom: 25px;
        }

        .pergunta {
            font-size: 1.6rem;
            font-weight: 800;
            line-height: 1.2;
            text-align: left;
            color: #0f172a;
        }

        .audio-btn {
            font-size: 2rem;
            background: none;
            border: none;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .audio-btn:hover { transform: scale(1.2); }

        .opcao {
            display: flex;
            align-items: center;
            width: 100%;
            margin: 12px 0;
            padding: 18px 25px;
            border-radius: 15px;
            border: none;
            color: white;
            font-size: 1.3rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
            text-align: left;
        }

        .opcao-letra {
            font-size: 1.6rem;
            font-weight: 900;
            margin-right: 20px;
            width: 35px;
            height: 35px;
            background: rgba(0,0,0,0.15);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .a { background: linear-gradient(135deg, #3b82f6 0%, #1e40af 100%); }
        .b { background: linear-gradient(135deg, #22c55e 0%, #166534 100%); }
        .c { background: linear-gradient(135deg, #a855f7 0%, #6b21a8 100%); }

        .correct { 
            background: #15803d !important; 
            box-shadow: 0 0 20px rgba(22, 163, 74, 0.6);
            animation: pulse 0.5s infinite alternate;
        }

        @keyframes pulse {
            from { transform: scale(1); }
            to { transform: scale(1.05); }
        }

        .wrong { background: #b91c1c !important; opacity: 0.8; }

        .close {
            position: absolute;
            top: -15px;
            right: -15px;
            background: #ef4444;
            color: white;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            cursor: pointer;
            border: 3px solid white;
        }

        /* MASCOTE REATIVO */
        .mascote-area {
            position: fixed;
            bottom: 20px;
            right: 20px;
            display: flex;
            align-items: flex-end;
            z-index: 5;
        }

        .balao {
            background: white;
            color: #1e293b;
            padding: 12px 20px;
            border-radius: 20px 20px 0 20px;
            margin-right: 15px;
            max-width: 180px;
            font-size: 14px;
            font-weight: bold;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }

        .mascote-emoji {
            font-size: 4rem;
            transition: transform 0.3s;
        }

        /* FINAL */
        #final {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(10, 20, 50, 0.98);
            z-index: 200;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 20px;
        }

        .msg-final {
            font-size: clamp(2rem, 6vw, 4rem);
            font-weight: 900;
            background: linear-gradient(135deg, var(--title-yellow) 0%, var(--title-cyan) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 20px;
        }
    </style>
</head>

<body>

<div class="topo">
    <div class="titulo">⚽ QUIZ ESPORTIVO DO BEM ⚽</div>
</div>

<div class="grid" id="grid"></div>

<div class="modal" id="modal">
    <div class="box" id="box"></div>
</div>

<div id="final">
    <span style="font-size: 7rem; margin-bottom: 20px;">🌸</span>
    <div class="msg-final">Parabéns Turma Flores, vocês são incríveis!</div>
    <button onclick="location.reload()" style="padding: 20px 50px; border-radius: 50px; border: none; background: var(--title-yellow); color: #122049; font-weight: 900; font-size: 1.4rem; cursor: pointer;">JOGAR NOVAMENTE</button>
</div>

<div class="mascote-area">
    <div class="balao" id="fala">Escolha uma carta para começar!</div>
    <div class="mascote-emoji" id="mascote">🤖</div>
</div>

<audio id="acerto" src="https://assets.mixkit.co/sfx/preview/mixkit-winning-chimes-2015.mp3"></audio>
<audio id="erro" src="https://assets.mixkit.co/sfx/preview/mixkit-wrong-answer-fail-notification-946.mp3"></audio>

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

<script>
let usadas = 0;
const mascote = document.getElementById("mascote");
const fala = document.getElementById("fala");

const cards = [
    {emoji:"🥋", q:"Qual esporte usa kimono?", o:["Judô","Futebol","Natação"], a:0},
    {emoji:"🏊", q:"Qual esporte acontece na piscina?", o:["Natação","Corrida","Judô"], a:0},
    {emoji:"🏀", q:"Qual esporte joga a bola na cesta?", o:["Basquete","Vôlei","Tênis"], a:0},
    {emoji:"🏐", q:"Qual esporte joga por cima da rede?", o:["Vôlei","Futebol","Judô"], a:0},
    {emoji:"🏃", q:"Qual esporte é correr rápido?", o:["Corrida","Natação","Tênis"], a:0},
    {emoji:"🎾", q:"Qual usa raquete?", o:["Tênis","Futebol","Judô"], a:0},
    {emoji:"⚽", q:"Qual usa os pés para chutar?", o:["Futebol","Tênis","Vôlei"], a:0},
    {emoji:"🤺", q:"Qual usa espada?", o:["Esgrima","Basquete","Natação"], a:0},
    {emoji:"🤸", q:"Qual faz acrobacias?", o:["Ginástica","Futebol","Tênis"], a:0},
    {emoji:"🥊", q:"Qual usa luvas para lutar?", o:["Boxe","Vôlei","Corrida"], a:0},
    {emoji:"🚴", q:"Qual usa bicicleta?", o:["Ciclismo","Natação","Judô"], a:0},
    {emoji:"🏹", q:"Qual usa arco e flecha?", o:["Tiro com arco","Futebol","Basquete"], a:0},
    {emoji:"🏓", q:"Qual usa mesa e raquete pequena?", o:["Tênis de mesa","Corrida","Judô"], a:0},
    {emoji:"🏋️", q:"Qual levanta peso?", o:["Levantamento de peso","Futebol","Tênis"], a:0},
    {emoji:"💦", q:"Qual pula na água?", o:["Saltos ornamentais","Corrida","Vôlei"], a:0},
    {emoji:"🏄", q:"Qual usa prancha no mar?", o:["Surfe","Basquete","Judô"], a:0},
    {emoji:"🛹", q:"Qual usa skate?", o:["Skate","Natação","Futebol"], a:0},
    {emoji:"🚣", q:"Qual usa barco com remos?", o:["Remo","Corrida","Tênis"], a:0},
    {emoji:"🤾", q:"Qual usa as mãos e tem goleiro?", o:["Handebol","Futebol","Tênis"], a:0},
    {emoji:"🏈", q:"Qual corre com a bola na mão?", o:["Rugby","Vôlei","Basquete"], a:0}
];

const grid = document.getElementById("grid");

cards.forEach((c, i) => {
    const div = document.createElement("div");
    div.className = "card";
    div.innerText = i + 1;
    div.onclick = () => openCard(i, div);
    grid.appendChild(div);
});

function narrar(texto) {
    const voz = new SpeechSynthesisUtterance(texto);
    voz.lang = 'pt-BR';
    voz.rate = 1.1;
    window.speechSynthesis.speak(voz);
}

function openCard(i, el){
    const c = cards[i];
    const box = document.getElementById("box");
    const letras = ['A', 'B', 'C'];
    const cores = ['a', 'b', 'c'];

    mascote.innerText = "🤔";
    fala.innerText = "Deixe-me ver essa...";

    box.innerHTML = `
        <div class="close" onclick="fecharModal()">X</div>
        <span class="emoji-pergunta">${c.emoji}</span>
        <div class="pergunta-container">
            <div class="pergunta">${c.q}</div>
            <button class="audio-btn" onclick="narrar('${c.q}')">🔊</button>
        </div>
        ${c.o.map((op, idx) => `
            <button class="opcao ${cores[idx]}" onclick="responder(${idx}, ${c.a}, this)">
                <span class="opcao-letra">${letras[idx]}</span>
                ${op}
            </button>
        `).join("")}
    `;

    document.getElementById("modal").style.display = "flex";
    el.classList.add("used");
    
    // Auto-narração ao abrir
    setTimeout(() => narrar(c.q), 500);
}

function fecharModal(){
    document.getElementById("modal").style.display = "none";
    window.speechSynthesis.cancel();
}

function responder(sel, correta, el){
    const botoes = document.querySelectorAll(".opcao");
    botoes.forEach(b => b.style.pointerEvents = "none");

    if(sel == correta){
        el.classList.add("correct");
        document.getElementById("acerto").play();
        mascote.innerText = "🤩";
        fala.innerText = "Incrível! Você acertou!";
        confetti({particleCount: 150, spread: 70});
    } else {
        el.classList.add("wrong");
        botoes[correta].classList.add("correct"); // Feedback de aprendizado
        document.getElementById("erro").play();
        mascote.innerText = "💪";
        fala.innerText = "Quase! Aprenda essa e vamos para a próxima!";
    }

    usadas++;
    setTimeout(() => {
        fecharModal();
        if(usadas == cards.length) {
            document.getElementById("final").style.display = "flex";
            confetti({particleCount: 300, spread: 100});
        } else {
            mascote.innerText = "🤖";
            fala.innerText = "Escolha outro número!";
        }
    }, 2500);
}
</script>
</body>
</html>
