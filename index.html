<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Quiz Esportivo do Bem</title>

<style>
body {
    font-family: Arial;
    background: radial-gradient(circle, #0b2a6b, #071a3a);
    color: white;
    text-align: center;
}

/* TOPO */
.topo {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 15px 30px;
}

.titulo {
    font-size: 32px;
    font-weight: bold;
    color: gold;
}

.score-box {
    background: #0d2c6c;
    padding: 10px 20px;
    border-radius: 15px;
    border: 2px solid white;
}

/* GRID */
.grid {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 15px;
    max-width: 900px;
    margin: auto;
    padding: 20px;
}

/* CARTAS */
.card {
    height: 140px;
    background: #3b3b3b;
    border-radius: 15px;
    border: 2px solid #aaa;
    display: flex;
    justify-content: center;
    align-items: center;
    font-size: 18px;
    cursor: pointer;
    transition: 0.3s;
}

.card:hover {
    transform: scale(1.05);
}

.card.used {
    background: #222;
    opacity: 0.5;
    cursor: not-allowed;
}

/* MODAL */
.modal {
    position: fixed;
    top:0; left:0;
    width:100%; height:100%;
    background: rgba(0,0,0,0.7);
    display:none;
    justify-content:center;
    align-items:center;
}

.modal-box {
    background: #dfe6f5;
    color: #0b2a6b;
    border-radius: 20px;
    width: 420px;
    padding: 20px;
    position: relative;
}

/* FECHAR */
.close {
    position: absolute;
    top: -10px;
    right: -10px;
    background: red;
    color: white;
    border-radius: 50%;
    padding: 8px 12px;
    cursor: pointer;
}

/* IMAGEM */
.modal-img {
    width: 120px;
    margin-bottom: 10px;
}

/* PERGUNTA */
.question {
    font-size: 22px;
    margin-bottom: 15px;
}

/* OPÇÕES */
.option {
    display: flex;
    align-items: center;
    justify-content: flex-start;
    margin: 8px 0;
    padding: 12px;
    border-radius: 12px;
    color: white;
    font-weight: bold;
    cursor: pointer;
}

/* CORES */
.a { background: #2b6df3; }
.b { background: #2eb82e; }
.c { background: #8e2de2; }

.correct { background: green !important; }
.wrong { background: red !important; }

</style>
</head>

<body>

<div class="topo">
    <div class="titulo">🏆 QUIZ ESPORTIVO DO BEM ⚽</div>
    <div class="score-box">⭐ Pontos: <span id="score">0</span></div>
</div>

<div class="grid" id="grid"></div>

<div class="modal" id="modal">
    <div class="modal-box" id="modalBox"></div>
</div>

<script>

let score = 0;

const cards = [
{
imgCard:"https://cdn-icons-png.flaticon.com/512/861/861512.png",
imgPergunta:"https://cdn-icons-png.flaticon.com/512/857/857455.png",
q:"Qual esporte usa kimono?",
o:["Futebol","Judô","Natação"],
a:1
},
{
imgCard:"https://cdn-icons-png.flaticon.com/512/861/861512.png",
imgPergunta:"https://cdn-icons-png.flaticon.com/512/2965/2965567.png",
q:"Qual esporte é na água?",
o:["Basquete","Natação","Corrida"],
a:1
},
{
imgCard:"https://cdn-icons-png.flaticon.com/512/861/861512.png",
imgPergunta:"https://cdn-icons-png.flaticon.com/512/889/889455.png",
q:"Qual usa cesta?",
o:["Futebol","Basquete","Vôlei"],
a:1
},
{
imgCard:"https://cdn-icons-png.flaticon.com/512/861/861512.png",
imgPergunta:"https://cdn-icons-png.flaticon.com/512/1041/1041916.png",
q:"Qual usa rede?",
o:["Judô","Vôlei","Corrida"],
a:1
},
{
imgCard:"https://cdn-icons-png.flaticon.com/512/861/861512.png",
imgPergunta:"https://cdn-icons-png.flaticon.com/512/3043/3043887.png",
q:"Qual é corrida?",
o:["Corrida","Tênis","Judô"],
a:0
}
];

const grid = document.getElementById("grid");
const modal = document.getElementById("modal");
const modalBox = document.getElementById("modalBox");

cards.forEach((c,i)=>{
    const card = document.createElement("div");
    card.className = "card";
    card.innerHTML = `<div>Carta ${i+1}</div>`;

    card.onclick = () => {
        if(card.classList.contains("used")) return;
        openCard(i, card);
    };

    grid.appendChild(card);
});

function speak(text){
    const msg = new SpeechSynthesisUtterance(text);
    msg.lang = "pt-BR";
    speechSynthesis.speak(msg);
}

function openCard(i, cardElement){
    const c = cards[i];

    modalBox.innerHTML = `
        <div class="close" onclick="closeModal()">X</div>

        <img src="${c.imgPergunta}" class="modal-img">

        <div class="question">${c.q}</div>

        ${c.o.map((opt,idx)=>`
            <div class="option ${idx===0?'a':idx===1?'b':'c'}"
            onclick="answer(${idx},${c.a}, this)">
            ${String.fromCharCode(65+idx)} - ${opt}
            </div>
        `).join("")}
    `;

    speak(c.q);

    modal.style.display = "flex";
    cardElement.classList.add("used");
}

function answer(selected, correct, el){
    if(selected === correct){
        el.classList.add("correct");
        score++;
        document.getElementById("score").innerText = score;
    } else {
        el.classList.add("wrong");
    }
}

function closeModal(){
    modal.style.display = "none";
}

</script>

</body>
</html>
