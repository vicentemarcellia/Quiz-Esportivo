<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Quiz Infantil</title>

<style>
body{
    margin:0;
    font-family: 'Comic Sans MS', Arial;
    background: linear-gradient(#0b2a5b, #061a3a);
    color:white;
}

/* TOPO */
.topo{
    display:flex;
    justify-content:space-between;
    padding:20px 40px;
}

.titulo{
    font-size:35px;
    font-weight:bold;
    background: linear-gradient(to right, yellow, cyan, lime);
    -webkit-background-clip:text;
    color:transparent;
}

.pontos{
    background:#0c3c8c;
    padding:10px 20px;
    border-radius:15px;
}

/* GRID */
.grid{
    display:grid;
    grid-template-columns: repeat(5, 150px);
    justify-content:center;
    gap:20px;
}

/* CARTAS */
.card{
    height:110px;
    background:#222;
    border-radius:15px;
    display:flex;
    justify-content:center;
    align-items:center;
    cursor:pointer;
    transition:0.3s;
}

.card:hover{ transform:scale(1.05); }
.card.used{ opacity:0.3; pointer-events:none; }

/* MODAL */
.modal{
    position:fixed;
    width:100%;
    height:100%;
    top:0;
    left:0;
    background:rgba(0,0,0,0.7);
    display:none;
    justify-content:center;
    align-items:center;
}

.box{
    background:#fff;
    color:black;
    padding:20px;
    border-radius:20px;
    width:450px;
    text-align:center;
    position:relative;
}

.box img{ width:150px; }

.pergunta{ font-size:20px; margin:10px 0; }

.opcao{
    margin:10px;
    padding:12px;
    border-radius:15px;
    color:white;
    cursor:pointer;
}

.a{background:#1e90ff;}
.b{background:#28a745;}
.c{background:#8a2be2;}

.correct{background:green !important;}
.wrong{background:red !important;}

.close{
    position:absolute;
    top:-10px;
    right:-10px;
    background:red;
    color:white;
    border-radius:50%;
    width:30px;
    height:30px;
    cursor:pointer;
}

/* FINAL */
.final{
    display:none;
    text-align:center;
    margin-top:50px;
}

</style>
</head>

<body>

<div class="topo">
<div class="titulo">🏆 QUIZ ESPORTIVO DO BEM</div>
<div class="pontos">⭐ <span id="score">0</span></div>
</div>

<div class="grid" id="grid"></div>

<div class="modal" id="modal">
<div class="box" id="box"></div>
</div>

<div class="final" id="final">
<h1>🎉 Parabéns!</h1>
<p>Você completou o jogo!</p>
</div>

<!-- ÁUDIOS -->
<audio id="acerto" src="https://assets.mixkit.co/sfx/preview/mixkit-winning-chimes-2015.mp3"></audio>
<audio id="erro" src="https://assets.mixkit.co/sfx/preview/mixkit-wrong-answer-fail-notification-946.mp3"></audio>
<audio id="bg" src="https://assets.mixkit.co/music/preview/mixkit-game-level-music-689.mp3" loop></audio>

<!-- CONFETE -->
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

<script>

let score = 0;
let usadas = 0;

document.getElementById("bg").volume = 0.3;

document.body.addEventListener("click", ()=>{
    document.getElementById("bg").play();
}, {once:true});

const cards = [
{img:"https://img.icons8.com/color/200/judo.png", q:"Qual esporte usa kimono?", o:["Futebol","Judô","Natação"], a:1},
{img:"https://img.icons8.com/color/200/swimming.png", q:"Qual acontece na água?", o:["Natação","Corrida","Tênis"], a:0},
{img:"https://img.icons8.com/color/200/basketball.png", q:"Qual usa cesta?", o:["Basquete","Vôlei","Judô"], a:0},
{img:"https://img.icons8.com/color/200/volleyball.png", q:"Qual usa rede?", o:["Vôlei","Futebol","Corrida"], a:0},
{img:"https://img.icons8.com/color/200/running.png", q:"Qual é correr?", o:["Corrida","Judô","Tênis"], a:0},
{img:"https://img.icons8.com/color/200/tennis.png", q:"Qual usa raquete?", o:["Tênis","Basquete","Futebol"], a:0},
{img:"https://img.icons8.com/color/200/soccer-ball.png", q:"Qual usa os pés?", o:["Futebol","Tênis","Judô"], a:0},
{img:"https://img.icons8.com/color/200/swimming.png", q:"Qual usa piscina?", o:["Natação","Basquete","Corrida"], a:0},
{img:"https://img.icons8.com/color/200/judo.png", q:"Qual é luta?", o:["Judô","Tênis","Vôlei"], a:0},
{img:"https://img.icons8.com/color/200/volleyball.png", q:"Qual joga com rede?", o:["Vôlei","Futebol","Corrida"], a:0},
{img:"https://img.icons8.com/color/200/running.png", q:"Qual é em pista?", o:["Corrida","Natação","Judô"], a:0},
{img:"https://img.icons8.com/color/200/basketball.png", q:"Qual tem bola laranja?", o:["Basquete","Tênis","Futebol"], a:0},
{img:"https://img.icons8.com/color/200/tennis.png", q:"Qual bate na bolinha?", o:["Tênis","Corrida","Judô"], a:0},
{img:"https://img.icons8.com/color/200/soccer-ball.png", q:"Qual tem goleiro?", o:["Futebol","Vôlei","Tênis"], a:0},
{img:"https://img.icons8.com/color/200/swimming.png", q:"Qual mergulha?", o:["Natação","Basquete","Corrida"], a:0},
{img:"https://img.icons8.com/color/200/judo.png", q:"Qual usa faixa?", o:["Judô","Futebol","Tênis"], a:0},
{img:"https://img.icons8.com/color/200/volleyball.png", q:"Qual não segura a bola?", o:["Vôlei","Judô","Corrida"], a:0},
{img:"https://img.icons8.com/color/200/running.png", q:"Qual corre rápido?", o:["Corrida","Natação","Judô"], a:0},
{img:"https://img.icons8.com/color/200/basketball.png", q:"Qual acerta na cesta?", o:["Basquete","Futebol","Tênis"], a:0},
{img:"https://img.icons8.com/color/200/tennis.png", q:"Qual tem rede baixa?", o:["Tênis","Futebol","Corrida"], a:0}
];

const grid = document.getElementById("grid");

cards.forEach((c,i)=>{
    const div = document.createElement("div");
    div.className="card";
    div.innerText="Carta "+(i+1);
    div.onclick=()=>openCard(i, div);
    grid.appendChild(div);
});

function openCard(i, el){
    const c = cards[i];
    const box = document.getElementById("box");

    box.innerHTML = `
        <div class="close" onclick="fechar()">X</div>
        <img src="${c.img}">
        <div class="pergunta">${c.q}</div>

        ${c.o.map((op,idx)=>`
            <div class="opcao ${idx==0?'a':idx==1?'b':'c'}"
            onclick="responder(${idx},${c.a}, this, ${i})">
            ${String.fromCharCode(65+idx)} - ${op}
            </div>
        `).join("")}
    `;

    document.getElementById("modal").style.display="flex";
    el.classList.add("used");
}

function responder(sel, correta, el){

    const opcoes = document.querySelectorAll(".opcao");

    // BLOQUEIA CLIQUES DUPLOS
    opcoes.forEach(o => o.style.pointerEvents = "none");

    // DESTACA TODAS
    opcoes.forEach((op, idx) => {
        if(idx == correta){
            op.classList.add("correct");
        }
    });

    if(sel == correta){

        // ACERTO
        el.classList.add("correct");

        document.getElementById("acerto").currentTime = 0;
        document.getElementById("acerto").play();

        confetti({
            particleCount:150,
            spread:80
        });

        score++;
        document.getElementById("score").innerText = score;

    } else {

        // ERRO
        el.classList.add("wrong");

        document.getElementById("erro").currentTime = 0;
        document.getElementById("erro").play();
    }

    usadas++;

    // ESPERA 2 SEGUNDOS E FECHA
    setTimeout(() => {
        fechar();

        // FINAL DO JOGO
        if(usadas == 20){
            document.getElementById("final").style.display = "block";
        }

    }, 2000);
}
    usadas++;

    if(usadas==20){
        setTimeout(()=>{
            document.getElementById("final").style.display="block";
        },1000);
    }
}

function fechar(){
    document.getElementById("modal").style.display="none";
}

</script>

</body>
</html>
