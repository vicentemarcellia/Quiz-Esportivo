<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Cartas do Bem</title>

<style>
body {
    font-family: Arial;
    background: linear-gradient(135deg, #1e3c72, #2a5298);
    text-align: center;
    color: white;
}

h1 {
    margin: 20px;
}

.grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
    gap: 15px;
    padding: 20px;
}

.card {
    perspective: 1000px;
}

.inner {
    position: relative;
    width: 100%;
    height: 180px;
    transition: transform 0.6s;
    transform-style: preserve-3d;
    cursor: pointer;
}

.card.flipped .inner {
    transform: rotateY(180deg);
}

.front, .back {
    position: absolute;
    width: 100%;
    height: 100%;
    border-radius: 12px;
    backface-visibility: hidden;
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 10px;
}

.front {
    background: #00c9a7;
    font-size: 18px;
}

.back {
    background: #222;
    transform: rotateY(180deg);
    font-size: 14px;
}

.number {
    font-size: 12px;
    opacity: 0.7;
}

.option {
    background: #444;
    margin: 3px;
    padding: 5px;
    border-radius: 6px;
}

.correct {
    background: green;
}
</style>
</head>

<body>

<h1>🃏 Cartas do Quiz Esportivo do Bem</h1>

<div class="grid" id="grid"></div>

<script>

const cards = [
{q:"Qual esporte usa bola e gol?", o:["Futebol","Natação","Tênis"], a:0},
{q:"Qual é na água?", o:["Basquete","Natação","Corrida"], a:1},
{q:"Qual usa cesta?", o:["Vôlei","Basquete","Futebol"], a:1},
{q:"Qual usa rede?", o:["Judô","Vôlei","Corrida"], a:1},
{q:"Qual é correr?", o:["Corrida","Xadrez","Tênis"], a:0},
{q:"Qual usa kimono?", o:["Judô","Futebol","Tênis"], a:0},
{q:"Qual usa raquete?", o:["Tênis","Futebol","Corrida"], a:0},
{q:"Dividir é:", o:["Ruim","Bom","Feio"], a:1},
{q:"Ajudar é:", o:["Empurrar","Ajudar amigo","Brigar"], a:1},
{q:"Aplaudir é:", o:["Ruim","Legal","Chato"], a:1},
{q:"Empurrar é:", o:["Certo","Errado","Legal"], a:1},
{q:"Respeitar é:", o:["Importante","Bobo","Inútil"], a:0},
{q:"Esperar vez é:", o:["Errado","Certo","Chato"], a:1},
{q:"Brincar junto é:", o:["Melhor","Pior","Tanto faz"], a:0},
{q:"Tratar bem é:", o:["Raiva","Carinho","Tristeza"], a:1},
{q:"No jogo devemos:", o:["Brigar","Ajudar","Ignorar"], a:1},
{q:"Jesus ensinou:", o:["Amor","Briga","Ignorar"], a:0},
{q:"Amizade é:", o:["Boa","Ruim","Sem valor"], a:0},
{q:"Cooperar é:", o:["Brigar","Ajudar","Mandar"], a:1},
{q:"O mais importante:", o:["Ganhar","Amar","Ser melhor"], a:1}
];

const grid = document.getElementById("grid");

cards.forEach((c, i) => {
    const card = document.createElement("div");
    card.className = "card";

    card.innerHTML = `
    <div class="inner" onclick="flip(this)">
        <div class="front">
            <div class="number">Carta ${i+1}</div>
            ❓
        </div>
        <div class="back">
            <div>${c.q}</div>
            ${c.o.map((opt, idx) =>
                `<div class="option ${idx===c.a ? 'correct':''}">${opt}</div>`
            ).join("")}
        </div>
    </div>
    `;

    grid.appendChild(card);
});

function flip(el){
    el.parentElement.classList.toggle("flipped");
}

</script>

</body>
</html>
